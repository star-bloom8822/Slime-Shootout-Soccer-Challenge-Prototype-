<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Slime Shootout: Soccer Challenge</title>
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
            body, html { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
            
            #gameViewport { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
            #sky { background: linear-gradient(to bottom, #1a2a6c, #b21f1f); flex: 1; position: relative; transition: background 0.3s; }
            #grass { background: linear-gradient(to bottom, #11998e, #38ef7d); flex: 1; position: relative; border-top: 4px solid #fff; }
            
            /* The Visual Goal Line Net Tracker */
            #goalPost {
                position: absolute;
                top: 0;
                width: 100%;
            text-align: center;
                color: rgba(255, 255, 255, 0.4);
                font-family: monospace;
                font-size: 20px;
                font-weight: bold;
            letter-spacing: 2px;
            }
 
            #scoreLabel { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; }
            #timerLabel { position: absolute; top: 20px; right: 20px; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; }
        #announcementLabel { position: absolute; width: 100%; text-align: center; top: 20%; color: #ffeb3b; font-size: 28px; font-weight: bold; text-shadow: 3px 3px #000; display: none; z-index: 10; padding: 0 10px; }
            
            /* Premium Centered Dashboard Card Layout */
        #replayContainer {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 90%;
                max-width: 340px;
                display: none;
                z-index: 30;
            text-align: center;
            }
            
        #leaderboardDisplay {
            background: rgba(0, 0, 0, 0.95);
                border: 3px solid #fff;
            border-radius: 12px;
                padding: 20px;
                color: #fff;
            font-family: monospace;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            }
        #leaderboardDisplay h4 { text-align: center; color: #ffeb3b; margin-bottom: 15px; font-size: 16px; letter-spacing: 1px; }
            
            .score-row { display: flex; justify-content: space-between; margin: 10px 0; padding: 10px 14px; background: rgba(255,255,255,0.08); border-radius: 6px; font-size: 16px; border-left: 3px solid #ccc; }
            .gold-rank { background: rgba(255, 215, 0, 0.15); border: 1px solid #ffd700; border-left: 4px solid #ffd700; color: #ffd700; font-weight: bold; font-size: 18px; }
            
            #replayButton {
                width: 100%;
                padding: 16px;
                font-size: 22px;
            font-weight: bold;
                color: #fff;
            background: #ff9800;
                border: 3px solid #fff;
            border-radius: 12px;
                cursor: pointer;
            box-shadow: 0 6px 0 #b56b00, 0 10px 20px rgba(0,0,0,0.5);
            text-shadow: 1px 1px #000;
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-tap-highlight-color: transparent;
            }
        #replayButton:active { transform: translateY(4px); box-shadow: 0 2px 0 #b56b00, 0 4px 10px rgba(0,0,0,0.5); }
 
            /* Custom Pure Text Soccer Ball Formatting */
            .arcadeBall {
                position: absolute;
                color: #fff;
            font-family: monospace;
            font-weight: bold;
                font-size: 28px;
            pointer-events: none;
            text-shadow: 1px 1px 4px #000;
                animation: ballFlyUp 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards;
                z-index: 5;
            }
            @keyframes ballFlyUp {
                0% { transform: translateY(100vh) scale(1.3); opacity: 1; }
                100% { transform: translateY(-25vh) scale(0.6); opacity: 0; }
            }
 
            #slimeGoalie { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 70px; background-color: #9c27b0; border-radius: 50% 50% 10% 10%; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: width 0.12s, height 0.12s, opacity 0.4s, background-color 0.3s; will-change: left; }
            #slimeLabel { color: white; font-size: 20px; font-weight: bold; font-family: monospace; white-space: nowrap; }
            #impactOverlay { position: absolute; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 20; transition: opacity 0.08s ease-out; }
        </style>
</head>
<body>
 
        <div id="gameViewport">
            <div id="impactOverlay"></div>
            <div id="sky">
                <div id="scoreLabel">SCORE: 0</div>
                <div id="timerLabel">TIME LEFT: 45</div>
                <div id="announcementLabel"></div>
            </div>
            <div id="grass">
                <div id="goalPost">|======================= GOAL =======================|</div>
                <div id="replayContainer">
                <div id="leaderboardDisplay">
                    <h4>\(*v*)/ TOP RANKINGS</h4>
                    <div id="leaderboardRows"></div>
                </div>
                <button id="replayButton">PLAY AGAIN</button>
            </div>
                <div id="slimeGoalie">
                <span id="slimeLabel">(-_ -) zZ</span>
           </div>
            </div>
        </div>
 
        <script>
            let time_elapsed = 0;
            let current_score = 0;
            let game_over = false;
            let is_currently_diving = false;
            let wave_position = 0;
            let gameTimer = null;
            let animationFrameId = null; // Track loop to prevent overlaps
            
            let target_speed = 0.04;
            let current_speed = 0.04;
            let target_width = 100;
            let current_width = 100;
            let movement_mode = "normal";
            
            const slime = document.getElementById('slimeGoalie');
            const slimeLabel = document.getElementById('slimeLabel');
            const scoreLabel = document.getElementById('scoreLabel');
            const timerLabel = document.getElementById('timerLabel');
            const announcementLabel = document.getElementById('announcementLabel');
            const sky = document.getElementById('sky');
            const impact = document.getElementById('impactOverlay');
            const grass = document.getElementById('grass');
            const replayContainer = document.getElementById('replayContainer');
            const replayButton = document.getElementById('replayButton');
            const leaderboardRows = document.getElementById('leaderboardRows');
            
            const rapidFirePanicEmotes = ["(>_<)X", "D :", "//o//", "\\(^0^)/", ":/"];
            
            function updateMovement() {
                if (game_over) return;
                
                if (time_elapsed >= 0 && time_elapsed <= 15) {
                movement_mode = "normal";
                target_speed = 0.04;  
                target_width = 100;
                } else if (time_elapsed >= 16 && time_elapsed <= 19) {
                movement_mode = "midair";
                target_speed = 0.09;  
                target_width = 35;         
                } else if (time_elapsed >= 20 && time_elapsed <= 22) {
                movement_mode = "finesse";
                target_speed = 0.14;  
                target_width = 25;         
                } else if (time_elapsed >= 23 && time_elapsed <= 25) {
                movement_mode = "spinning";
                target_speed = 0.03; 
                target_width = 150;        
                } else if (time_elapsed >= 26 && time_elapsed <= 27) {
                movement_mode = "normal";
                target_speed = 0.055; 
                target_width = 125;
                } else if (time_elapsed >= 28 && time_elapsed <= 43) {
                    if (is_currently_diving) {
                    movement_mode = "hyperDiving";
                    target_speed = 0.32; 
                    target_width = 190;
                    } else {
                    movement_mode = "normal";
                    target_speed = 0.164;
                    target_width = 165;
                    }
                }
                
            current_speed += (target_speed - current_speed) * 0.035;
            current_width += (target_width - current_width) * 0.035;
            wave_position += current_speed;
                
                if (time_elapsed < 44) {
                    const screen_center = window.innerWidth / 2;
                    let x_pos = screen_center;
                    
                    if (movement_mode === "spinning") {
                    x_pos += Math.sin(wave_position * 2.5) * Math.cos(wave_position) * current_width;
                    } else if (movement_mode === "finesse") {
                    x_pos += Math.sin(wave_position * 1.5) * current_width;
                    } else {
                    x_pos += Math.sin(wave_position) * current_width;
                    }
                    
                slime.style.left = `${x_pos}px`;
                }
                
            animationFrameId = requestAnimationFrame(updateMovement);
            }
 
            function handleInput(e) {
                if (game_over) return;
                if (e.target.id === 'replayButton') return;
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                
                if (!is_currently_diving && time_elapsed < 44) {
                slime.style.height = "42px";
                slime.style.width = "125px";
                setTimeout(() => {
                        if (!is_currently_diving && !game_over) {
                        slime.style.height = "70px";
                        slime.style.width = "100px";
                        }
                    }, 110);
                }
 
                if (time_elapsed >= 28 && time_elapsed <= 43) {
                current_score += 3;
                } else if (time_elapsed >= 16 && time_elapsed <= 25) {
                current_score += 5;
                } else if (time_elapsed === 44) {
                current_score += 15;
                triggerBulletImpactFlash();
                } else {
                current_score += 1;
                }
                
            spawnVisualBall(clientX);
            updateScoreTracker();
            }
            
        window.addEventListener('touchstart', (e) => {
            if(e.target.id === 'replayButton') return;
            e.preventDefault();
            handleInput(e);
            }, { passive: false });
        window.addEventListener('mousedown', handleInput);
        replayButton.addEventListener('click', (e) => { e.stopPropagation(); resetGameMatch(); });
 
            function spawnVisualBall(startX) {
                const ball = document.createElement('div');
            ball.className = 'arcadeBall';
            ball.innerText = 'O';
            ball.style.left = `${startX - 8}px`;
            ball.style.bottom = '15px';
            grass.appendChild(ball);
            setTimeout(() => ball.remove(), 350);
            }
 
            function triggerBulletImpactFlash() {
                const randomX = Math.floor(Math.random() * 80) + 10;
                const randomY = Math.floor(Math.random() * 60) + 10;
            impact.style.background = `radial-gradient(circle at ${randomX}% ${randomY}%, #ffffff 5%, #ffeb3b 25%, #ff3d00 55%, transparent 85%)`;
            impact.style.opacity = "1";
            sky.style.background = "#050505";
            setTimeout(() => { impact.style.opacity = "0"; }, 180);
            }
 
            function saveAndFetchScores(newScore) {
                let records = JSON.parse(localStorage.getItem('slime_scores')) || [0, 0, 0];
            records.push(newScore);
            records.sort((a, b) => b - a);
                records = records.slice(0, 3);
            localStorage.setItem('slime_scores', JSON.stringify(records));
                
            leaderboardRows.innerHTML = '';
            records.forEach((score, idx) => {
                    const badge = idx === 0 ? "==>" : idx === 1 ? "-->" : "  > ";
                    const rowClass = idx === 0 ? "score-row gold-rank" : "score-row";
                leaderboardRows.innerHTML += `<div class="${rowClass}"><span>${badge} BEST ${idx+1}</span><strong>${score} PTS</strong></div>`;
                });
            }
 
            function runGameTimeline() {
                gameTimer = setInterval(() => {
                time_elapsed += 1;
                timerLabel.innerText = `TIME LEFT: ${Math.max(0, 45 - time_elapsed)}`;
         
                    if (time_elapsed >= 1 && time_elapsed <= 4) {
                    slime.style.backgroundColor = "#546e7a";
                    slimeLabel.innerText = "(-_ -) zZ";
                    }
                    else if (time_elapsed >= 5 && time_elapsed <= 10) {
                    slime.style.backgroundColor = "#9c27b0";
                    slimeLabel.innerText = "(^-^)b";
                    }
                    else if (time_elapsed >= 11 && time_elapsed <= 15) {
                    slime.style.backgroundColor = "#3f51b5";
                    slimeLabel.innerText = "T_T";
                    }
                    else if (time_elapsed >= 16 && time_elapsed <= 19) {
                    slime.style.backgroundColor = "#ff9800";
                    slimeLabel.innerText = "8)";
                    announcementLabel.innerText = "MID-AIR VOLLEY!!!";
                    announcementLabel.style.display = "block";
                    }
                    else if (time_elapsed >= 20 && time_elapsed <= 22) {
                    slime.style.backgroundColor = "#00bcd4";
                    slime.style.height = "60px";
                    slime.style.width = "110px";
                    slimeLabel.innerText = "=_=";
                    announcementLabel.innerText = "A PERFECTLY CURVED STRIKE!!!";
                    }
                    else if (time_elapsed >= 23 && time_elapsed <= 25) {
                    slime.style.height = "85px";
                    slime.style.width = "85px";
                    slime.style.backgroundColor = "#00e676";
                    slimeLabel.innerText = "@_@";
                    announcementLabel.innerText = "SPINNING TRICK SHOT INCOMING!!!";
                    }
                    else if (time_elapsed >= 26 && time_elapsed <= 27) {
                    announcementLabel.innerText = "WARNING: POWER SHOTS TRIGGERED...";
                    slime.style.backgroundColor = "#d84315";
                    slimeLabel.innerText = "0_0";
                    }
                    else if (time_elapsed >= 28 && time_elapsed <= 43) {
                    announcementLabel.innerText = "QUICK SHOTS! TAP FAST!!!";
                    announcementLabel.style.display = "block";
                    slime.style.backgroundColor = "#ff1744";
                        
                        if ((time_elapsed - 28) % 6 === 0) {
                        is_currently_diving = true;
                        slimeLabel.innerText = "___(X_X)___";
                        slime.style.height = "15px";
                        slime.style.width = "215px";
                        slime.style.backgroundColor = "#2979ff";
                       
                        setTimeout(() => {
                            is_currently_diving = false;
                            if(!game_over) {
                                slime.style.height = "70px";
                                slime.style.width = "100px";
                                slime.style.backgroundColor = "#ff1744";
                            }
                        }, 850);
                        } else if (!is_currently_diving) {
                        slimeLabel.innerText = rapidFirePanicEmotes[(time_elapsed % rapidFirePanicEmotes.length)];
                        slime.style.height = "70px";
                        slime.style.width = "100px";
                        }
                    }
                    else if (time_elapsed === 44) {
                    slime.style.backgroundColor = "#00e5ff";
                    slime.style.height = "100px";
                    slime.style.width = "100px";
                    announcementLabel.innerText = "AN UNSTOPPABLE WINNING GOAL!!!";
                    announcementLabel.style.display = "block";
                    slimeLabel.innerText = "\\(0-0)/";
                    }
                    else if (time_elapsed >= 45) {
                    clearInterval(gameTimer);
                    cancelAnimationFrame(animationFrameId); // Stop loop safely
                    game_over = true;
                        
                    slimeLabel.innerText = "*-*";
                    slime.style.backgroundColor = "#ff3d00";
                    slime.style.height = "80px";
                    slime.style.width = "80px";
                        
                    setTimeout(() => {
                        slimeLabel.innerText = "_ / _";
                        slime.style.height = "4px";
                        slime.style.width = "225px";
                        slime.style.opacity = "0";
                        }, 600);
                        
                    announcementLabel.innerText = "Good game. Penalty Shootout finished.";
                    announcementLabel.style.display = "block";
                        
                    setTimeout(() => {
                        if (current_score < 100) {
                            announcementLabel.innerHTML = `Top Rankings!<br><br><span style='color:#cd7f32; font-size:32px; text-shadow: 2px 2px #000;'>Rank: Rookie </span>`;
                        } else {
                            announcementLabel.innerHTML = `Match Ended!<br><br><span style='color:#ffd700; font-size:32px; text-shadow: 2px 2px #000;'>Rank: GRAND CHAMPION!</span>`;
                        }
                        saveAndFetchScores(current_score);
                        replayContainer.style.display = "block";
                        }, 2500);
                    }
                    
                updateScoreTracker();
                }, 1000);
            }
 
            function updateScoreTracker() {
            scoreLabel.innerText = `SCORE: ${current_score}`;
            }
 
            function resetGameMatch() {
            clearInterval(gameTimer);
            cancelAnimationFrame(animationFrameId); // Reset any running frames
            time_elapsed = 0;
            current_score = 0;
                game_over = false;
            is_currently_diving = false;
            wave_position = 0;
            target_speed = 0.04;
            current_speed = 0.04;
            target_width = 100;
            current_width = 100;
            movement_mode = "normal";
 
            slime.style.opacity = "1";
            slime.style.height = "70px";
            slime.style.width = "100px";
            slime.style.left = "50%";
            slime.style.backgroundColor = "#546e7a";
            slimeLabel.innerText = "(-_ -) zZ";
                
            sky.style.background = "linear-gradient(to bottom, #1a2a6c, #b21f1f)";
            announcementLabel.style.display = "none";
            replayContainer.style.display = "none";
                
            updateScoreTracker();
            timerLabel.innerText = "TIME LEFT: 45";
                
            animationFrameId = requestAnimationFrame(updateMovement);
            runGameTimeline();
            }
 
        animationFrameId = requestAnimationFrame(updateMovement);
        runGameTimeline();
        </script>
</body>
</html>
